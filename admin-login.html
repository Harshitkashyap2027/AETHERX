<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F59E0B" />
  <title>AETHERX – Admin Login</title>
  <style>
    /* ─── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080810;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* ─── Background orbs (amber/red for admin) ─────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-amber { background: rgba(251, 191, 36, 0.12); width: 500px; height: 500px; top: -150px; left: -100px; }
    .orb-red   { background: rgba(239, 68, 68, 0.09);  width: 400px; height: 400px; bottom: -100px; right: -80px; }

    /* grid lines overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Card wrapper ──────────────────────────────────────── */
    .card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Logo / header ─────────────────────────────────────── */
    .logo-area { text-align: center; margin-bottom: 2rem; }

    .shield-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 68px; height: 68px; border-radius: 18px;
      background: linear-gradient(135deg, #d97706, #ef4444);
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.35);
      margin-bottom: 1rem;
      font-size: 32px;
    }

    .admin-title {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fbbf24, #ef4444);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .admin-sub { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 4px; }

    /* Caution banner */
    .caution-banner {
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.22);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: rgba(251, 191, 36, 0.9);
    }
    .caution-banner .icon { font-size: 16px; flex-shrink: 0; }

    /* ─── Glass card ────────────────────────────────────────── */
    .card {
      background: rgba(14, 14, 22, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(251, 191, 36, 0.14);
      border-radius: 20px;
      padding: 2rem;
    }
    .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }

    /* ─── Form ──────────────────────────────────────────────── */
    .form-group { position: relative; margin-bottom: 1rem; }
    .form-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 15px; pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 42px;
      color: #fff;
      width: 100%;
      outline: none;
      font-size: 14px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
    }
    input::placeholder { color: rgba(255,255,255,0.28); }

    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.35);
      cursor: pointer; font-size: 18px; padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: #fff; }

    /* ─── Buttons ───────────────────────────────────────────── */
    .btn-admin {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #d97706, #ef4444);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .btn-admin:hover:not(:disabled) {
      opacity: 0.92; transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.38);
    }
    .btn-admin:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ─── Error banner inside card ──────────────────────────── */
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 1rem;
      display: none;
    }

    /* ─── Back link ─────────────────────────────────────────── */
    .back-link {
      text-align: center; margin-top: 1.25rem;
      font-size: 14px; color: rgba(255,255,255,0.35);
    }
    .back-link a { color: rgba(251,191,36,0.8); text-decoration: none; }
    .back-link a:hover { color: #fbbf24; }

    /* ─── Toast ─────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #12121A; border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 12px 20px; border-radius: 14px;
      font-size: 14px; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      white-space: nowrap;
    }
    #toast.show  { opacity: 1; }
    #toast.error { border-color: rgba(239,68,68,0.5); color: #fca5a5; }
    #toast.success { border-color: rgba(251,191,36,0.5); color: #fbbf24; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A12; }
    ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="orb orb-amber"></div>
  <div class="orb orb-red"></div>

  <div class="card-wrap">
    <!-- Header -->
    <div class="logo-area">
      <div class="shield-icon">🛡️</div>
      <div class="admin-title">Admin Portal</div>
      <div class="admin-sub">AETHERX Control Tower</div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="caution-banner">
        <span class="icon">⚠️</span>
        <span>Restricted access — authorised administrators only</span>
      </div>

      <h2>Administrator Sign-In</h2>

      <div class="error-box" id="errorBox"></div>

      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <span class="form-icon">✉</span>
          <input type="email" id="email" placeholder="Admin email address" autocomplete="username" required />
        </div>

        <div class="form-group">
          <span class="form-icon">🔒</span>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password">👁</button>
        </div>

        <button type="submit" class="btn-admin" id="loginBtn">🛡️ &nbsp;Access Admin Panel</button>
      </form>
    </div>

    <p class="back-link">← <a href="login.html">Back to user login</a></p>
  </div>

  <div id="toast"></div>

  <!-- Firebase CDN (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ─── Helpers ─────────────────────────────────────────────
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = ''; }, 3500);
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      btn.disabled = loading;
      btn.innerHTML = loading ? '⏳ &nbsp;Verifying…' : '🛡️ &nbsp;Access Admin Panel';
    }

    // ─── Toggle password ─────────────────────────────────────
    document.getElementById('togglePass').addEventListener('click', () => {
      const pass = document.getElementById('password');
      const btn  = document.getElementById('togglePass');
      const show = pass.type === 'password';
      pass.type  = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁';
    });

    // ─── Admin roles that are allowed ─────────────────────────
    const ADMIN_ROLES = new Set(['admin', 'super_admin', 'moderator']);

    // ─── Form submit ─────────────────────────────────────────
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in both fields.');
        return;
      }

      setLoading(true);
      try {
        // 1. Sign in with Firebase Auth
        const cred = await auth.signInWithEmailAndPassword(email, password);

        // 2. Fetch user profile from Firestore
        const snap = await db.collection('users').doc(cred.user.uid).get();

        if (!snap.exists) {
          await auth.signOut();
          showError('No user profile found. Please contact the system administrator.');
          return;
        }

        const profile = snap.data();

        // 3. Verify admin role
        if (!ADMIN_ROLES.has(profile.role)) {
          await auth.signOut();
          showError('Access denied. You do not have admin privileges.');
          return;
        }

        // 4. Check if banned
        if (profile.isBanned) {
          await auth.signOut();
          showError('Your account has been suspended.');
          return;
        }

        showToast('Welcome, ' + (profile.displayName || 'Admin') + '! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'admin.html'; }, 900);

      } catch (err) {
        const code = err.code || '';
        let msg = 'Login failed. Please try again.';
        if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (code === 'auth/too-many-requests') {
          msg = 'Too many failed attempts. Please wait a moment.';
        } else if (code === 'auth/network-request-failed') {
          msg = 'Network error. Check your internet connection.';
        }
        showError(msg);
      } finally {
        setLoading(false);
      }
    });

    // ─── Already logged in as admin? redirect ─────────────────
    auth.onAuthStateChanged(async (user) => {
      if (!user) return;
      try {
        const snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists && ADMIN_ROLES.has(snap.data().role) && !snap.data().isBanned) {
          window.location.href = 'admin.html';
        }
      } catch (_) { /* ignore */ }
    });
  </script>
</body>
</html>
