<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />
  <title>AETHERX – Login</title>
  <style>
    /* ─── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0A0A0F;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* ─── Background orbs ───────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-purple { background: rgba(108, 99, 255, 0.18); width: 500px; height: 500px; top: -150px; left: -150px; }
    .orb-pink   { background: rgba(255, 101, 132, 0.12); width: 400px; height: 400px; bottom: -100px; right: -100px; }

    /* ─── Card ──────────────────────────────────────────────── */
    .card-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.4);
      margin-bottom: 1rem;
    }
    .logo-icon span { color: #fff; font-size: 28px; font-weight: 800; }
    .logo-title {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-top: 4px; }

    /* Glass card */
    .card {
      background: rgba(18, 18, 26, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2rem;
    }
    .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }

    /* Form */
    .form-group { position: relative; margin-bottom: 1rem; }
    .form-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 16px; pointer-events: none;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 42px;
      color: #fff;
      width: 100%;
      outline: none;
      font-size: 14px;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input:focus {
      border-color: #6C63FF;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.35);
      cursor: pointer; font-size: 18px; padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: #fff; }

    /* Buttons */
    .btn-primary {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.9; transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.4);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; padding: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-secondary:hover:not(:disabled) {
      background: rgba(255,255,255,0.11); transform: translateY(-1px);
    }
    .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.25rem 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .divider-text { color: rgba(255,255,255,0.3); font-size: 12px; }

    /* Footer link */
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 14px; color: rgba(255,255,255,0.4); }
    .footer-link a { color: #8B84FF; text-decoration: none; font-weight: 500; }
    .footer-link a:hover { color: #6C63FF; }

    /* Admin link badge */
    .admin-link-wrap { text-align: center; margin-top: 1rem; }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.25);
      color: #fbbf24;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      text-decoration: none; transition: background 0.2s;
    }
    .admin-badge:hover { background: rgba(251, 191, 36, 0.18); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #12121A; border: 1px solid rgba(255,255,255,0.1);
      color: #fff; padding: 12px 20px; border-radius: 14px;
      font-size: 14px; z-index: 9999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    #toast.error { border-color: rgba(255,101,132,0.5); color: #FF6584; }
    #toast.success { border-color: rgba(108,99,255,0.5); color: #9B94FF; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #12121A; }
    ::-webkit-scrollbar-thumb { background: #6C63FF; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="orb orb-purple"></div>
  <div class="orb orb-pink"></div>

  <div class="card-wrap">
    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon"><span>A</span></div>
      <div class="logo-title">AETHERX</div>
      <div class="logo-sub">Developer Social Platform</div>
    </div>

    <!-- Login card -->
    <div class="card">
      <h2>Welcome back</h2>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="form-group">
          <span class="form-icon">✉</span>
          <input type="email" id="email" placeholder="Email address" autocomplete="email" required />
        </div>

        <!-- Password -->
        <div class="form-group">
          <span class="form-icon">🔒</span>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Show/hide password">👁</button>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-secondary" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="footer-link">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>
    </div>

    <!-- Admin login link -->
    <div class="admin-link-wrap">
      <a href="admin-login.html" class="admin-badge">
        🛡️ Admin Login
      </a>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Firebase CDN (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ─── Helpers ─────────────────────────────────────────────
    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = ''; }, 3500);
    }

    function setLoading(btn, loading, text, loadingText) {
      btn.disabled = loading;
      btn.textContent = loading ? loadingText : text;
    }

    // ─── Toggle password ─────────────────────────────────────
    const toggleBtn = document.getElementById('togglePass');
    const passInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const isText = passInput.type === 'text';
      passInput.type = isText ? 'password' : 'text';
      toggleBtn.textContent = isText ? '👁' : '🙈';
    });

    // ─── Email / password login ───────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');

      if (!email || !password) {
        showToast('Please fill in all fields');
        return;
      }

      setLoading(btn, true, 'Sign In', 'Signing in…');
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        // Check if user is banned
        const snap = await db.collection('users').doc(cred.user.uid).get();
        if (snap.exists && snap.data().isBanned) {
          await auth.signOut();
          showToast('Your account has been suspended.');
          return;
        }
        showToast('Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        const code = err.code || '';
        let msg = 'Login failed. Please try again.';
        if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
          msg = 'Invalid email or password.';
        } else if (code === 'auth/too-many-requests') {
          msg = 'Too many failed attempts. Please wait a moment.';
        } else if (code === 'auth/network-request-failed') {
          msg = 'Network error. Check your internet connection.';
        }
        showToast(msg);
      } finally {
        setLoading(btn, false, 'Sign In', 'Signing in…');
      }
    });

    // ─── Google login ─────────────────────────────────────────
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>Connecting…</span>';
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const cred = await auth.signInWithPopup(provider);
        // Create/update profile in Firestore if new user
        const userRef = db.collection('users').doc(cred.user.uid);
        const snap = await userRef.get();
        if (!snap.exists) {
          await userRef.set({
            uid:         cred.user.uid,
            email:       cred.user.email,
            displayName: cred.user.displayName || '',
            photoURL:    cred.user.photoURL || '',
            username:    '',
            bio:         '',
            role:        'user',
            isVerified:  false,
            isBanned:    false,
            followers:   [],
            following:   [],
            createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
          });
        } else if (snap.data().isBanned) {
          await auth.signOut();
          showToast('Your account has been suspended.');
          return;
        }
        showToast('Login successful! Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        showToast('Google login failed. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google`;
      }
    });

    // ─── Already logged in? redirect ──────────────────────────
    auth.onAuthStateChanged((user) => {
      if (user) {
        // Already authenticated – redirect away from login page
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
